<!doctype html>
<!-- Mode clair forcé :
       - data-fr-scheme : préférence utilisateur lue au boot par la DSFR.
       - data-fr-theme  : thème effectif. On le pose en dur pour que le
         CSS soit en light dès la première peinture (avant que le JS
         DSFR ne s'exécute, pour éviter un flash sombre).
     Le script inline ci-dessous force aussi localStorage.scheme à
     'light' : la DSFR (dsfr.module.js l.3826) lit en PRIORITÉ
     localStorage avant l'attribut HTML. Sans ce coup de pouce, une
     visite antérieure qui aurait stocké 'system' ou 'dark' garderait
     la main sur la page actuelle. -->
<html lang="fr" data-fr-scheme="light" data-fr-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quadrant</title>
    <script>try { localStorage.setItem('scheme', 'light'); } catch (_) {}</script>

    <!-- Iframe cross-origin (hébergement quadsies.dgesip.fr embarqué
         depuis dialogue.dgesip.fr) : `window.frameElement` lève
         SecurityError dans ce contexte. La DSFR y accède sans try/catch
         dans plusieurs classes (RadioButtonGroup.push pour les
         fr-segmented, FocusTrap, Modal.adjust) → erreurs console
         à chaque interaction. On neutralise en amont en redéfinissant
         le getter pour renvoyer null comme s'il s'agissait d'un top
         frame, ce qui est l'équivalent fonctionnel d'un iframe
         cross-origin du point de vue du JS embarqué (pas d'accès au
         parent).
         Inline + avant le module ES principal : ce script tire AVANT
         que main.jsx (et donc DSFR) n'ait commencé à s'exécuter. -->
    <script>
      try {
        Object.defineProperty(window, 'frameElement', {
          get: function () { return null; },
          configurable: true,
        });
      } catch (_) { /* anciens navigateurs : on laisse */ }
    </script>

    <!-- Favicons DSFR (copiés depuis @gouvfr/dsfr/dist/favicon/ dans
         public/favicon/ — recommandations du Système de Design de l'État).
         Le manifest exige crossorigin=use-credentials cf. doc DSFR. -->
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
    <link rel="icon" href="/favicon/favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" type="image/x-icon" />
    <link rel="manifest" href="/favicon/manifest.webmanifest" crossorigin="use-credentials" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
